<style>
  .theme-toggle {
    position: fixed; bottom: 20px; right: 20px; 
    padding: 10px 20px; border-radius: 30px; 
    background: #333; color: white; 
    border: 1px solid #555; cursor: pointer; 
    z-index: 9999;
  }
  /* Dark mode overrides */
  body.dark-mode {
    background-color: #1a1a1a !important;
    color: #e0e0e0 !important;
  }
  body.dark-mode a { color: #88b4ff !important; }
  body.dark-mode .wrapper { background-color: #1a1a1a !important; }
  body.dark-mode .site-header, 
  body.dark-mode .site-footer { background-color: #222 !important; }
</style>

<button class="theme-toggle" id="theme-toggle-btn">🌙 Dark</button>
<script>
  (function() {
    const btn = document.getElementById('theme-toggle-btn');
    const isDark = localStorage.getItem('darkMode') === 'true';
    if (isDark) { document.body.classList.add('dark-mode'); btn.textContent = '☀️ Light'; }
    
    btn.addEventListener('click', function() {
      document.body.classList.toggle('dark-mode');
      const nowDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('darkMode', nowDark);
      btn.textContent = nowDark ? '☀️ Light' : '🌙 Dark';
    });
  })();
</script>
